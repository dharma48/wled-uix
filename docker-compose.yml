services:
  wled-uix:
    image: ghcr.io/dharma48/wled-uix:latest
    # To build from source instead of pulling the published image, comment out the
    # `image:` line above and uncomment the line below:
    # build: .
    container_name: wled-uix
    restart: unless-stopped
    # Host networking lets the app do mDNS (_wled._tcp) discovery on your LAN.
    # If you don't need auto-discovery, remove `network_mode` and use the `ports`
    # mapping below instead.
    network_mode: host
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Log verbosity: error | warn | info | debug (default: info)
      # - LOG_LEVEL=info
    volumes:
      - ./data:/data
    # ports:
    #   - "3000:3000"
